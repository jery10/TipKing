{% extends "base.html" %}
{% block title %}Sign In — TipKing{% endblock %}
{% block content %}
<div class="container">
  <div style="max-width:420px;margin:60px auto">

    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:2.5rem;margin-bottom:12px">👑</div>
      <div style="font-size:1.6rem;font-weight:900;margin-bottom:6px">Welcome back</div>
      <div style="color:var(--muted)">Sign in to make predictions and track your earnings</div>
    </div>

    <div class="card">
      <div class="card-body">
        {% if error %}
        <div style="background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);
                    color:var(--red);padding:12px 16px;border-radius:8px;
                    font-size:0.88rem;margin-bottom:20px">
          ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST">
          <input type="hidden" name="next" value="{{ next }}">

          <div class="form-group">
            <label>Email address</label>
            <input type="email" name="email" placeholder="your@email.com" required autofocus>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;padding:14px;font-size:1rem;margin-top:4px">
            Sign In →
          </button>
        </form>

        <div style="text-align:center;margin-top:20px;font-size:0.88rem;color:var(--muted)">
          Don't have an account?
          <a href="/register" style="color:var(--primary-light);font-weight:700;margin-left:4px">Create one free →</a>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
